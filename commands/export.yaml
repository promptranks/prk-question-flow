# prk-question-export Command

Generate DB-ready SQL and JSON exports.

## Usage

```bash
prk-question-export
```

## Behavior

1. **Export only qa_status: PASSED**
2. **Generate export/questions.sql**
3. **Generate export/questions.json**
4. **Include industry/role linkages**

## Output

```
Exporting questions...

✓ 148 PASSED questions exported
✓ export/questions.sql (PostgreSQL)
✓ export/questions.json (API import)

Ready for manual import to database.
```
