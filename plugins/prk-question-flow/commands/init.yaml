# prk-question-init Command

Initialize a new question generation workspace with industries and roles.

## Usage

```bash
# Initialize with industries
prk-question-init --industry=core,tech,finance

# Initialize roles (after industries)
prk-question-init --role
```

## Parameters

- `--industry`: Comma-separated industry slugs (default: core)
- `--role`: Flag to generate roles based on industries

## Behavior

### With --industry

1. **Create timestamped working folder**
   - Format: `.prk-question/work-YYYY-MM-DD-NNN/`
   - Increment NNN if multiple runs same day

2. **Update state.yaml**
   ```yaml
   current_work_folder: work-2026-03-28-001
   created_at: 2026-03-28T10:00:00Z
   locked: false
   ```

4. **Call agent:**
   - `industry-role-generator` with industry_slugs parameter

5. **Create industry.yaml**
   ```yaml
   industries:
     - id: uuid
       name: Technology
       slug: tech
       description: Software, hardware, IT services
   ```

5. **Cache existing questions**
   - Fetch all questions from database
   - Save to `.prk-question/cache/core_questions.yaml`

### With --role

1. **Call agent:**
   - `industry-role-generator` with industry_yaml_path parameter

2. **For each industry, fetch roles**
   - Query: `SELECT id, name, slug, industry_id, responsibilities FROM roles WHERE industry_id = ?`

3. **Create roles.yaml**
   ```yaml
   roles:
     - id: uuid
       name: Data Scientist
       slug: data-scientist
       industry_id: uuid
       industry_slug: tech
       responsibilities:
         - Build predictive models
         - Analyze datasets
   ```

## Output

```
✓ Created working folder: work-2026-03-28-001
✓ Initialized 3 industries
✓ Cached 131 existing questions
✓ Generated 15 roles

Run 'prk-question-plan' to preview generation.
```

## Error Handling

- If `.prk-question/` doesn't exist, create it
- If MCP server unavailable, use cached data
- If no industries specified, default to 'core'
